apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: angular-micro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      serviceAccountName: user-service-sa
      containers:
        - name: user-service
          image: PLACEHOLDER_ECR_URI/angular-microservices/user-service:latest
          ports:
            - containerPort: 5100
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:5100"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: user-service-db
                  key: connection-string
          volumeMounts:
            - name: db-secret
              mountPath: /mnt/secrets-store
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 5100
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5100
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: db-secret
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: user-service-db
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: angular-micro
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 5100
      targetPort: 5100

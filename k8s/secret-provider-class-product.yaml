apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: product-service-db
  namespace: angular-micro
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "angular-micro/product-service/db"
        objectType: "secretsmanager"
        jmesPath:
          - path: "connectionString"
            objectAlias: "connection-string"
  secretObjects:
    - secretName: product-service-db
      type: Opaque
      data:
        - objectName: connection-string
          key: connection-string

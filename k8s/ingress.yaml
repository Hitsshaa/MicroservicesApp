apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: micro-ingress
  namespace: angular-micro
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /index.html
    # Exclude static files from rewrite
    nginx.ingress.kubernetes.io/configuration-snippet: |
      if ($request_uri ~* "\.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$") {
        break;
      }
spec:
  ingressClassName: nginx
  rules:
    - host: localhost
      http:
        paths:
          # API backend (preserve everything after /api)
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: api-gateway
                port:
                  number: 5000
          # Angular frontend (catch all other routes)
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: angular-client
                port:
                  number: 80

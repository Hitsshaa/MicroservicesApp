apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: angular-micro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: angular-micro/user-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5100
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ASPNETCORE_URLS
              value: "http://+:5100"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: user-service-db
                  key: connection-string
          readinessProbe:
            httpGet:
              path: /health
              port: 5100
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5100
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: angular-micro
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - port: 5100
      targetPort: 5100

server {
    listen 80;
    server_name localhost; #optional if one server in container
    root /usr/share/nginx/html;
    index index.html;

    # Handle Angular routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to gateway — use resolver + variable so nginx won't fail if the
    # api-gateway container isn't resolvable at start time. If resolution fails
    # at runtime, requests will fallback to 127.0.0.1:5000.
    resolver 127.0.0.11 valid=30s; #Docker’s built-in DNS server  Cache DNS result for 30 seconds.
    set $upstream_api "http://api-gateway:5000"; #Store upstream in variable
    location /api/ {
        proxy_pass $upstream_api/api/; #deferred DNS (Does NOT resolve api-gateway during startup)
        proxy_set_header Host $host; #host name 
        proxy_set_header X-Real-IP $remote_addr;   # client ip
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;   # all proxy ip where request pass through 
        proxy_set_header X-Forwarded-Proto $scheme;   # define the type of requet like http or https 
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

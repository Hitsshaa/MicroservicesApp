name: CI-CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GKE_CLUSTER: angular-micro
  GKE_NAMESPACE: angular-micro
  AR_REPO: angular-micro
  GCP_PROJECT_ID: angular-micro
  GCP_REGION: us-central1
  WIF_PROVIDER: projects/1047441382714/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
  WIF_SERVICE_ACCOUNT: github-deployer@angular-micro.iam.gserviceaccount.com

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore MicroservicesApp.sln
      - name: Build
        run: dotnet build MicroservicesApp.sln -c Release --no-restore
      - name: Test
        run: dotnet test MicroservicesApp.sln -c Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/ClientApp/package-lock.json
      - name: Install deps
        working-directory: src/ClientApp
        run: npm ci
      - name: Lint
        working-directory: src/ClientApp
        run: npm run lint --if-present
      - name: Build (verification)
        working-directory: src/ClientApp
        run: npm run build -- --configuration production

  deploy:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Define registry URL
        run: echo "REGISTRY=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}" >> $GITHUB_ENV

      - name: Build & push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./src/ApiGateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/api-gateway:latest
            ${{ env.REGISTRY }}/api-gateway:${{ github.sha }}

      - name: Build & push user-service
        uses: docker/build-push-action@v6
        with:
          context: ./src/Microservices/UserService
          push: true
          tags: |
            ${{ env.REGISTRY }}/user-service:latest
            ${{ env.REGISTRY }}/user-service:${{ github.sha }}

      - name: Build & push product-service
        uses: docker/build-push-action@v6
        with:
          context: ./src/Microservices/ProductService
          push: true
          tags: |
            ${{ env.REGISTRY }}/product-service:latest
            ${{ env.REGISTRY }}/product-service:${{ github.sha }}

      - name: Build & push angular-client
        uses: docker/build-push-action@v6
        with:
          context: ./src/ClientApp
          push: true
          tags: |
            ${{ env.REGISTRY }}/angular-client:latest
            ${{ env.REGISTRY }}/angular-client:${{ github.sha }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GCP_REGION }}

      - name: Render placeholders in manifests
        run: |
          USER_GSA="angular-micro-user-svc@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          PRODUCT_GSA="angular-micro-product-svc@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          sed -i "s|PLACEHOLDER_REGISTRY|${{ env.REGISTRY }}|g" k8s/gke/*.yaml
          sed -i "s|PLACEHOLDER_USER_GSA|${USER_GSA}|g"        k8s/gke/serviceaccount-user.yaml
          sed -i "s|PLACEHOLDER_PRODUCT_GSA|${PRODUCT_GSA}|g"  k8s/gke/serviceaccount-product.yaml

      - name: Apply manifests (everything except the connection-string secrets)
        run: |
          # connection-strings.yaml has placeholders the next step replaces by
          # pulling real values from Secret Manager directly into kubectl, so
          # we deliberately skip it here.
          for f in $(ls k8s/gke/*.yaml | grep -v connection-strings.yaml); do
            kubectl apply -f "$f"
          done

      - name: Sync connection-string Secrets from GCP Secret Manager
        run: |
          USER_CONN=$(gcloud secrets versions access latest --secret=angular-micro-user-service-db --project=${{ env.GCP_PROJECT_ID }})
          PROD_CONN=$(gcloud secrets versions access latest --secret=angular-micro-product-service-db --project=${{ env.GCP_PROJECT_ID }})
          kubectl create secret generic user-service-db    -n ${{ env.GKE_NAMESPACE }} --from-literal=connection-string="$USER_CONN" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic product-service-db -n ${{ env.GKE_NAMESPACE }} --from-literal=connection-string="$PROD_CONN" --dry-run=client -o yaml | kubectl apply -f -

      - name: Force rollout to latest images
        run: |
          for svc in api-gateway user-service product-service angular-client; do
            kubectl set image deployment/${svc} \
              ${svc}=${{ env.REGISTRY }}/${svc}:${{ github.sha }} \
              -n ${{ env.GKE_NAMESPACE }}
          done

      - name: Wait for rollouts to stabilize
        run: |
          for svc in api-gateway user-service product-service angular-client; do
            kubectl rollout status deployment/${svc} -n ${{ env.GKE_NAMESPACE }} --timeout=5m
          done

      - name: Print public IP
        run: |
          echo "Public IP (allocation may take 1-2 min on first deploy):"
          kubectl get svc -n ${{ env.GKE_NAMESPACE }} angular-client -o wide

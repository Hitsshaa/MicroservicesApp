name: CI-CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GKE_CLUSTER: angular-micro
  GKE_NAMESPACE: angular-micro
  AR_REPO: angular-micro

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Restore
        run: dotnet restore MicroservicesApp.sln
      - name: Build
        run: dotnet build MicroservicesApp.sln -c Release --no-restore
      - name: Test
        run: dotnet test MicroservicesApp.sln -c Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: src/ClientApp/package-lock.json
      - name: Install deps
        working-directory: src/ClientApp
        run: npm ci
      - name: Lint
        working-directory: src/ClientApp
        run: npm run lint --if-present
      - name: Build (verification)
        working-directory: src/ClientApp
        run: npm run build -- --configuration production

  deploy:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ vars.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Define registry URL
        run: echo "REGISTRY=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.AR_REPO }}" >> $GITHUB_ENV

      - name: Build & push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: ./src/ApiGateway
          push: true
          tags: |
            ${{ env.REGISTRY }}/api-gateway:latest
            ${{ env.REGISTRY }}/api-gateway:${{ github.sha }}

      - name: Build & push user-service
        uses: docker/build-push-action@v6
        with:
          context: ./src/Microservices/UserService
          push: true
          tags: |
            ${{ env.REGISTRY }}/user-service:latest
            ${{ env.REGISTRY }}/user-service:${{ github.sha }}

      - name: Build & push product-service
        uses: docker/build-push-action@v6
        with:
          context: ./src/Microservices/ProductService
          push: true
          tags: |
            ${{ env.REGISTRY }}/product-service:latest
            ${{ env.REGISTRY }}/product-service:${{ github.sha }}

      - name: Build & push angular-client
        uses: docker/build-push-action@v6
        with:
          context: ./src/ClientApp
          push: true
          tags: |
            ${{ env.REGISTRY }}/angular-client:latest
            ${{ env.REGISTRY }}/angular-client:${{ github.sha }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ vars.GCP_REGION }}

      - name: Render placeholders in manifests
        run: |
          sed -i "s|PLACEHOLDER_REGISTRY|${{ env.REGISTRY }}|g" k8s/gke/*.yaml

      - name: Apply manifests
        run: kubectl apply -f k8s/gke/

      - name: Force rollout to latest images
        run: |
          for svc in api-gateway user-service product-service angular-client; do
            kubectl set image deployment/${svc} \
              ${svc}=${{ env.REGISTRY }}/${svc}:${{ github.sha }} \
              -n ${{ env.GKE_NAMESPACE }}
          done

      - name: Wait for rollouts to stabilize
        run: |
          for svc in api-gateway user-service product-service angular-client; do
            kubectl rollout status deployment/${svc} -n ${{ env.GKE_NAMESPACE }} --timeout=5m
          done

      - name: Print public IP
        run: |
          echo "Public IP (allocation may take 1-2 min on first deploy):"
          kubectl get svc -n ${{ env.GKE_NAMESPACE }} angular-client -o wide
